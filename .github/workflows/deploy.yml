name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend (EC2)'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy Frontend (Vercel)'
        required: true
        default: true
        type: boolean

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/alumnx-ecommerce

            echo "Pulling latest code..."
            git pull origin main

            echo "Setting up virtualenv & installing deps..."
            cd backend
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt

            echo "Writing .env from secrets..."
            cat > .env <<ENVEOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            CATEGORIES_TABLE=categories
            PRODUCTS_TABLE=products
            AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL }}
            ENVEOF

            echo "Restarting backend service..."
            sudo systemctl restart alumnx-backend

            echo "Backend deploy complete."

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

          echo "Frontend deploy complete."
